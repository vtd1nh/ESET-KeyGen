name: Generator

on:
  workflow_dispatch:
    inputs:
      account:
        description: 'Number of Accounts to be generated (default = 0)'
        required: false
        default: '0'
      key:
        description: 'Number of Keys to be generated (default = 1)'
        required: false
        default: '1'
      mail:
        description: 'Choose the mail provider to generate license'
        required: true
        type: choice
        options:
        - 1secmail
        - guerrillamail
        - developermail
        - mailticking
        default: developermail
      key_type:
        description: 'Modes of operation'
        required: true
        type: choice
        options:
        - --key
        - --small-business-key
        - --vpn-codes
        default: --key
  schedule:
    - cron: "0 0 1 * *" # Chạy vào lúc 00:00 ngày mùng 1 hàng tháng

jobs:
  GenerateKey:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate key
        id: generate_key
        run: |
          ACCOUNT=${{ github.event.inputs.account }}
          KEY=${{ github.event.inputs.key }}
          MAIL=${{ github.event.inputs.mail }}
          KEY_TYPE=${{ github.event.inputs.key_type }}

          git clone https://github.com/rzc0d3r/ESET-KeyGen.git
          cd ESET-KeyGen
          
          # Setup env
          sudo apt update
          sudo apt install -y python3-pip python3-venv
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

          if [[ ${ACCOUNT} -ne 0 && ${KEY} -ne 0 ]]; then
            seq 1 ${ACCOUNT} | xargs -I {} -P ${ACCOUNT} python3 main.py --chrome --account --email-api ${MAIL} --skip-webdriver-menu --skip-update-check --no-logo --disable-progress-bar &
            seq 1 ${KEY} | xargs -I {} -P ${KEY} python3 main.py --chrome ${KEY_TYPE} --email-api ${MAIL} --skip-webdriver-menu --skip-update-check --no-logo --disable-progress-bar
            wait
            echo "Account:" >> $GITHUB_STEP_SUMMARY
            cat ./*ACCOUNTS.txt >> $GITHUB_STEP_SUMMARY
            echo -e "\nKey:" >> $GITHUB_STEP_SUMMARY
            cat ./*KEYS.txt >> $GITHUB_STEP_SUMMARY
            ACCOUNTS=$(cat ./*ACCOUNTS.txt) # Lưu kết quả vào biến
            KEYS=$(cat ./*KEYS.txt) # Lưu kết quả vào biến
          elif [[ ${ACCOUNT} -ne 0 ]]; then
            seq 1 ${ACCOUNT} | xargs -I {} -P ${ACCOUNT} python3 main.py --chrome --account --email-api ${MAIL} --skip-webdriver-menu --skip-update-check --no-logo --disable-progress-bar
            echo -e "\nAccount:" >> $GITHUB_STEP_SUMMARY
            cat ./*ACCOUNTS.txt >> $GITHUB_STEP_SUMMARY
            ACCOUNTS=$(cat ./*ACCOUNTS.txt) # Lưu kết quả vào biến
          elif [[ ${KEY} -ne 0 ]]; then
            seq 1 ${KEY} | xargs -I {} -P ${KEY} python3 main.py --chrome ${KEY_TYPE} --email-api ${MAIL} --skip-webdriver-menu --skip-update-check --no-logo --disable-progress-bar
            echo -e "\nKey:" >> $GITHUB_STEP_SUMMARY
            cat ./*KEYS.txt >> $GITHUB_STEP_SUMMARY
            KEYS=$(cat ./*KEYS.txt) # Lưu kết quả vào biến
          fi
          
          # Ghi vào môi trường
          echo "ACCOUNTS=$ACCOUNTS" >> $GITHUB_ENV
          echo "KEYS=$KEYS" >> $GITHUB_ENV

      - name: Send email with results
        uses: dawidd6/action-send-mail@v3
        with:
          to: your_email@gmail.com # Địa chỉ email nhận
          subject: "ESET KeyGen Results"
          body: |
            The generation process is complete.

            **Accounts Created:**
            ${{ env.ACCOUNTS }}

            **Keys Generated:**
            ${{ env.KEYS }}
          from: vtdinh92@gmail.com # Địa chỉ email gửi
          server_address: smtp.gmail.com # Máy chủ SMTP cho Gmail
          server_port: 587 # Cổng SMTP cho Gmail
          username: vtdinh92@gmail.com # Tên người dùng SMTP
          password: ${{ secrets.SMTP_PASSWORD }} # Mật khẩu hoặc token SMTP
          secure: true # Sử dụng kết nối bảo mật (TLS)
